<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Trade Marketing | Sabesp</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --sabesp-blue: #0054a6;
      --sabesp-dark: #003d7a;
      --success: #10b981;
      --error: #ef4444;
      --bg: #f0f4f8;
    }
    * { box-sizing: border-box; }
    body { 
      font-family: 'Inter', 'Segoe UI', sans-serif; 
      background: linear-gradient(135deg, #e0e7ff 0%, #f0f4f8 50%, #dbeafe 100%);
      min-height: 100vh;
      padding: 16px;
      margin: 0;
    }
    
    .main-card { 
      max-width: 720px; 
      margin: 0 auto; 
      background: white; 
      padding: 32px; 
      border-radius: 20px; 
      box-shadow: 0 20px 60px rgba(0,84,166,0.12), 0 8px 24px rgba(0,0,0,0.08);
      border-top: 6px solid var(--sabesp-blue);
      position: relative;
      overflow: hidden;
    }
    .main-card::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(0,84,166,0.05) 0%, transparent 70%);
      pointer-events: none;
    }
    
    .header { 
      text-align: center; 
      margin-bottom: 28px; 
      padding-bottom: 20px;
      border-bottom: 1px solid #e5e7eb;
    }
    .header-logo { font-size: 2.5rem; margin-bottom: 8px; }
    .header h2 { 
      color: var(--sabesp-blue); 
      font-weight: 700; 
      font-size: 1.5rem;
      margin: 0 0 6px;
    }
    .header p { color: #6b7280; font-size: 0.9rem; margin: 0; }
    
    .section-title { 
      font-size: 0.85rem; 
      font-weight: 700; 
      color: var(--sabesp-blue); 
      margin: 24px 0 14px;
      padding: 8px 12px;
      background: linear-gradient(90deg, #eff6ff, transparent);
      border-left: 3px solid var(--sabesp-blue);
      border-radius: 0 8px 8px 0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .form-label { 
      font-weight: 600; 
      color: #374151; 
      font-size: 0.8rem; 
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .form-label .req { color: var(--error); }
    
    .form-control, .form-select { 
      border-radius: 10px; 
      padding: 12px 14px; 
      border: 2px solid #e5e7eb;
      font-size: 0.95rem;
      transition: all 0.2s ease;
    }
    .form-control:focus, .form-select:focus { 
      border-color: var(--sabesp-blue); 
      box-shadow: 0 0 0 4px rgba(0,84,166,0.1);
    }
    .form-control::placeholder { color: #9ca3af; }
    
    .btn-enviar { 
      background: linear-gradient(135deg, var(--sabesp-blue), var(--sabesp-dark));
      color: white; 
      padding: 16px 24px; 
      border-radius: 12px; 
      border: none; 
      font-weight: 700; 
      font-size: 1rem; 
      width: 100%; 
      margin-top: 28px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .btn-enviar:hover:not(:disabled) { 
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,84,166,0.3);
    }
    .btn-enviar:disabled { 
      opacity: 0.7; 
      cursor: not-allowed;
      transform: none;
    }
    .btn-enviar .spinner {
      width: 20px; height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .footer { 
      margin-top: 28px; 
      text-align: center; 
      font-size: 0.75rem; 
      color: #9ca3af;
      padding-top: 20px;
      border-top: 1px solid #f3f4f6;
    }
    .footer strong { color: #6b7280; }
    
    /* Toast elegante */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
    }
    .toast-msg {
      padding: 16px 24px;
      border-radius: 12px;
      color: white;
      font-weight: 600;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      animation: slideIn 0.4s ease;
      max-width: 340px;
    }
    .toast-msg.success { background: linear-gradient(135deg, #10b981, #059669); }
    .toast-msg.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
    .toast-msg .icon { font-size: 1.4rem; }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideOut {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(100%); opacity: 0; }
    }
    
    /* Mobile First */
    @media (max-width: 576px) {
      body { padding: 12px; }
      .main-card { padding: 20px 16px; border-radius: 16px; }
      .header h2 { font-size: 1.25rem; }
      .header-logo { font-size: 2rem; }
      .section-title { font-size: 0.75rem; margin: 20px 0 12px; }
      .form-control, .form-select { padding: 10px 12px; font-size: 16px; } /* 16px evita zoom no iOS */
      .btn-enviar { padding: 14px 20px; font-size: 0.95rem; }
      .toast-container { top: 10px; right: 10px; left: 10px; }
      .toast-msg { max-width: 100%; font-size: 0.85rem; padding: 14px 16px; }
    }
    
    /* Tablet */
    @media (min-width: 577px) and (max-width: 768px) {
      .main-card { padding: 28px 24px; }
    }
  </style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<div class="main-card">
  <div class="header">
    <div class="header-logo">💧</div>
    <h2>Portal Trade Marketing</h2>
    <p>Cadastro de Colaboradores e Promotores</p>
  </div>

  <form id="formBI">
    
    <div class="section-title">1. Dados Profissionais</div>
    <div class="row g-3">
      <div class="col-md-12">
        <label class="form-label">Nome Completo</label>
        <input type="text" id="nome" class="form-control" required placeholder="Seu nome completo">
      </div>
      <div class="col-md-6">
        <label class="form-label">E-mail</label>
        <input type="email" id="email" class="form-control" required placeholder="exemplo@sabesp.com.br">
      </div>
      <div class="col-md-6">
        <label class="form-label">Matrícula/RH</label>
        <input type="text" id="matricula" class="form-control" required placeholder="Sua matrícula">
      </div>
      <div class="col-md-6">
        <label class="form-label">Cargo</label>
        <input type="text" id="cargo" class="form-control" required placeholder="Ex: Promotor, Analista...">
      </div>
      <div class="col-md-6">
        <label class="form-label">Carga Horária</label>
        <input type="text" id="cargaHoraria" class="form-control" required placeholder="Ex: 220h, 6h/dia...">
      </div>
      <div class="col-md-4">
        <label class="form-label">Tem Interesse?</label>
        <select id="interesse" class="form-select" required>
          <option value="" disabled selected>Selecione...</option>
          <option value="Sim">Sim</option>
          <option value="Não">Não</option>
        </select>
      </div>
      <div class="col-md-8">
        <label class="form-label">Loja/Interesse</label>
        <select id="loja" class="form-select" required>
          <option value="" disabled selected>Selecione a loja...</option>
          <option value="SEM INTERESSE">SEM INTERESSE</option>
          <option value="Agência Mooca">Agência Mooca</option>
          <option value="Arthur Alvim">Arthur Alvim</option>
          <option value="Arujá">Arujá</option>
          <option value="Biritiba-Mirim">Biritiba-Mirim</option>
          <option value="Caieiras">Caieiras</option>
          <option value="Cajamar">Cajamar</option>
          <option value="Chacara Santo Antonio">Chacara Santo Antonio</option>
          <option value="Cidade Martins">Cidade Martins</option>
          <option value="Descomplica Butantã">Descomplica Butantã</option>
          <option value="Descomplica Campo Limpo">Descomplica Campo Limpo</option>
          <option value="Descomplica Capela do Socorro">Descomplica Capela do Socorro</option>
          <option value="Descomplica Cidade Tiradentes">Descomplica Cidade Tiradentes</option>
          <option value="Descomplica Mooca">Descomplica Mooca</option>
          <option value="Descomplica Parelheiros">Descomplica Parelheiros</option>
          <option value="Descomplica Penha">Descomplica Penha</option>
          <option value="Descomplica São Miguel Paulista">Descomplica São Miguel Paulista</option>
          <option value="Embu das Artes">Embu das Artes</option>
          <option value="Embu-Guaçu">Embu-Guaçu</option>
          <option value="Fácil Shopping Bonsucesso">Fácil Shopping Bonsucesso</option>
          <option value="Ferraz de Vasconcelos">Ferraz de Vasconcelos</option>
          <option value="Francisco Morato">Francisco Morato</option>
          <option value="Franco da Rocha">Franco da Rocha</option>
          <option value="Freguesia do Ó">Freguesia do Ó</option>
          <option value="Ganha Tempo Barueri">Ganha Tempo Barueri</option>
          <option value="Gopoúva">Gopoúva</option>
          <option value="Guararema">Guararema</option>
          <option value="Guarulhos- Câmara Municipal">Guarulhos- Câmara Municipal</option>
          <option value="Ipiranga">Ipiranga</option>
          <option value="Itaim Paulista">Itaim Paulista</option>
          <option value="Itapecerica da Serra">Itapecerica da Serra</option>
          <option value="Itaquaquecetuba">Itaquaquecetuba</option>
          <option value="Jandira">Jandira</option>
          <option value="Jardins">Jardins</option>
          <option value="Juquitiba">Juquitiba</option>
          <option value="M' Boi Mirim">M' Boi Mirim</option>
          <option value="Mairiporã">Mairiporã</option>
          <option value="Major Rugde">Major Rugde</option>
          <option value="Pinheiros - SEDE">Pinheiros - SEDE</option>
          <option value="Pirapora do Bom Jesus">Pirapora do Bom Jesus</option>
          <option value="Pirituba">Pirituba</option>
          <option value="Poá">Poá</option>
          <option value="Polo Taboão da Serra">Polo Taboão da Serra</option>
          <option value="Resolve Fácil Itapevi">Resolve Fácil Itapevi</option>
          <option value="Ribeirão Pires">Ribeirão Pires</option>
          <option value="Rio Grande da Serra">Rio Grande da Serra</option>
          <option value="Salesópolis">Salesópolis</option>
          <option value="Santa Isabel">Santa Isabel</option>
          <option value="Santana">Santana</option>
          <option value="Santana do Parnaíba">Santana do Parnaíba</option>
          <option value="Santo André -AG">Santo André -AG</option>
          <option value="São Lorenço da serra">São Lorenço da serra</option>
          <option value="São Mateus">São Mateus</option>
          <option value="Vargem Grande Paulista">Vargem Grande Paulista</option>
        </select>
      </div>
    </div>

    <div class="section-title">2. Informações de Endereço e Contato</div>
    <div class="row g-3">
      <div class="col-md-9">
        <label class="form-label">Rua (do Colaborador)</label>
        <input type="text" id="rua" class="form-control" placeholder="Nome da rua/avenida">
      </div>
      <div class="col-md-3">
        <label class="form-label">Número da casa</label>
        <input type="text" id="numero" class="form-control">
      </div>
      <div class="col-md-6">
        <label class="form-label">Bairro (do Colaborador)</label>
        <input type="text" id="bairro" class="form-control">
      </div>
      <div class="col-md-6">
        <label class="form-label">Cidade (do Colaborador)</label>
        <input type="text" id="cidade" class="form-control">
      </div>
      <div class="col-md-6">
        <label class="form-label">Cep (do Colaborador)</label>
        <input type="text" id="cep" class="form-control" placeholder="00000-000">
      </div>
      <div class="col-md-6">
        <label class="form-label">Telefone (do Colaborador)</label>
        <input type="text" id="telefone" class="form-control" placeholder="(11) 90000-0000">
      </div>
    </div>

    <button type="button" onclick="enviar()" class="btn-enviar" id="btnSubmit">💾 SALVAR INFORMAÇÕES</button>
  </form>

  <div class="footer">
    Desenvolvido por <strong>Samuel Ricardo</strong><br>
    Equipe de Planejamento Trade | Analista de B.I.
  </div>
</div>

<script>
  const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzRX6wy0x2NZU8qsqZ_QfcWzcXQPKF3l5RHhqLz024FnBYmR2f-OqJmE3Y4Zg00ig/exec";

  function showToast(message, type = 'success') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast-msg ${type}`;
    toast.innerHTML = `
      <span class="icon">${type === 'success' ? '✓' : '✕'}</span>
      <span>${message}</span>
    `;
    container.appendChild(toast);
    
    setTimeout(() => {
      toast.style.animation = 'slideOut 0.3s ease forwards';
      setTimeout(() => toast.remove(), 300);
    }, 3000);
  }

  function enviar() {
    const btn = document.getElementById('btnSubmit');
    const form = document.getElementById('formBI');
    
    // Validação rápida
    if (!form.checkValidity()) {
      form.reportValidity();
      return;
    }
    
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> ENVIANDO...';

    const payload = {
      nome: document.getElementById('nome').value.trim(),
      email: document.getElementById('email').value.trim(),
      matricula: document.getElementById('matricula').value.trim(),
      cargo: document.getElementById('cargo').value.trim(),
      cargaHoraria: document.getElementById('cargaHoraria').value.trim(),
      interesse: document.getElementById('interesse').value,
      loja: document.getElementById('loja').value,
      rua: document.getElementById('rua').value.trim(),
      numero: document.getElementById('numero').value.trim(),
      bairro: document.getElementById('bairro').value.trim(),
      cidade: document.getElementById('cidade').value.trim(),
      cep: document.getElementById('cep').value.trim(),
      telefone: document.getElementById('telefone').value.trim()
    };

    // Envio otimizado com timeout
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 15000);

    fetch(WEBAPP_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
      signal: controller.signal
    })
    .then(() => {
      clearTimeout(timeoutId);
      showToast('Cadastro salvo com sucesso!', 'success');
      form.reset();
    })
    .catch(erro => {
      clearTimeout(timeoutId);
      if (erro.name === 'AbortError') {
        showToast('Tempo esgotado. Tente novamente.', 'error');
      } else {
        showToast('Erro de conexão. Verifique sua internet.', 'error');
      }
    })
    .finally(() => {
      btn.disabled = false;
      btn.innerHTML = '💾 SALVAR INFORMAÇÕES';
    });
  }

  // Máscara de telefone
  document.getElementById('telefone')?.addEventListener('input', function(e) {
    let v = e.target.value.replace(/\D/g, '');
    if (v.length > 11) v = v.slice(0, 11);
    if (v.length > 6) v = `(${v.slice(0,2)}) ${v.slice(2,7)}-${v.slice(7)}`;
    else if (v.length > 2) v = `(${v.slice(0,2)}) ${v.slice(2)}`;
    else if (v.length > 0) v = `(${v}`;
    e.target.value = v;
  });

  // Máscara de CEP
  document.getElementById('cep')?.addEventListener('input', function(e) {
    let v = e.target.value.replace(/\D/g, '');
    if (v.length > 8) v = v.slice(0, 8);
    if (v.length > 5) v = `${v.slice(0,5)}-${v.slice(5)}`;
    e.target.value = v;
  });
</script>
</body>
</html>
